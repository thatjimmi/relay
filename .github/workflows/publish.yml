name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore relay.sln

      - name: Build
        run: dotnet build relay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test relay.sln --configuration Release --no-build --verbosity normal

      - name: Pack Relay.Inbox
        run: dotnet pack Relay.Inbox/Relay.Inbox.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Pack Relay.Outbox
        run: dotnet pack Relay.Outbox/Relay.Outbox.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Pack Relay (meta-package)
        run: dotnet pack Relay/Relay.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
